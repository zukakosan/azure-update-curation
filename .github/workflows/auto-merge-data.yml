name: Auto-merge data PRs

on:
  workflow_run:
    workflows:
      - "Azure Update 週次収集"
      - "Azure コミュニティ記事 週次収集"
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Find and merge data PR
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          # Find open PRs from github-actions[bot] that modify site/data/
          prs=$(gh pr list --repo "$REPO" --author "github-actions[bot]" --state open --json number,title --jq '.[].number')
          for pr in $prs; do
            files=$(gh pr view "$pr" --repo "$REPO" --json files --jq '.files[].path')
            if echo "$files" | grep -q '^site/data/'; then
              echo "Merging PR #$pr"
              gh pr merge "$pr" --repo "$REPO" --squash --admin
            fi
          done
