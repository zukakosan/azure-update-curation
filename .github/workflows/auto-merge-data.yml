name: Auto-merge data PRs

on:
  pull_request:
    types: [opened]
    paths:
      - 'site/data/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Auto-merge data update PR
        run: gh pr merge "$PR_URL" --squash --auto
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ github.token }}
